<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="val-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3d81"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="val-glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ff3d81" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff3d81" stop-opacity="0"/>
    </radialGradient>
    <pattern id="val-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" fill="#0f1220"/>
  <rect width="800" height="450" fill="url(#val-grid)"/>
  <rect width="800" height="450" fill="url(#val-glow)"/>

  <!-- radar / playstyle cluster web -->
  <g transform="translate(300,225)" opacity="0.9">
    <polygon points="0,-100 87,-50 87,50 0,100 -87,50 -87,-50" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>
    <polygon points="0,-66 58,-33 58,33 0,66 -58,33 -58,-33" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1.5"/>
    <polygon points="0,-33 29,-16 29,16 0,33 -29,16 -29,-16" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5"/>

    <!-- cluster A -->
    <polygon points="0,-88 70,-40 50,45 -10,80 -75,20" fill="#8b5cf6" fill-opacity="0.25" stroke="#8b5cf6" stroke-width="2.5"/>
    <!-- cluster B -->
    <polygon points="0,-50 40,-10 30,60 -30,50 -50,-20" fill="#22d3ee" fill-opacity="0.2" stroke="#22d3ee" stroke-width="2"/>

    <g fill="#ffffff">
      <circle cx="0" cy="-88" r="4"/><circle cx="70" cy="-40" r="4"/><circle cx="50" cy="45" r="4"/><circle cx="-10" cy="80" r="4"/><circle cx="-75" cy="20" r="4"/>
    </g>
  </g>

  <!-- bar chart / accuracy readout -->
  <g transform="translate(560,300)">
    <rect x="0" y="-40" width="18" height="40" fill="#8b5cf6" opacity="0.85"/>
    <rect x="26" y="-70" width="18" height="70" fill="#22d3ee" opacity="0.85"/>
    <rect x="52" y="-95" width="18" height="95" fill="url(#val-grad)"/>
    <rect x="78" y="-55" width="18" height="55" fill="#8b5cf6" opacity="0.6"/>
    <line x1="-10" y1="0" x2="106" y2="0" stroke="#ffffff" stroke-opacity="0.15" stroke-width="2"/>
  </g>

  <!-- crosshair / reticle -->
  <g transform="translate(560,120)" stroke="url(#val-grad)" stroke-width="3" fill="none">
    <circle r="34"/>
    <line x1="-50" y1="0" x2="-42" y2="0"/>
    <line x1="50" y1="0" x2="42" y2="0"/>
    <line x1="0" y1="-50" x2="0" y2="-42"/>
    <line x1="0" y1="50" x2="0" y2="42"/>
  </g>
</svg>
