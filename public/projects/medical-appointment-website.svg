<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="med-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="med-glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="med-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" fill="#0f1220"/>
  <rect width="800" height="450" fill="url(#med-grid)"/>
  <rect width="800" height="450" fill="url(#med-glow)"/>

  <!-- calendar card behind -->
  <g transform="translate(400,225)" opacity="0.9">
    <rect x="-190" y="-110" width="380" height="220" rx="18" fill="#0a0d14" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
    <line x1="-190" y1="-58" x2="190" y2="-58" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
    <line x1="-95" y1="-110" x2="-95" y2="-58" stroke="#ffffff" stroke-opacity="0.12" stroke-width="3"/>
    <line x1="95" y1="-110" x2="95" y2="-58" stroke="#ffffff" stroke-opacity="0.12" stroke-width="3"/>

    <!-- grid dots for days -->
    <g fill="#ffffff" opacity="0.15">
      <circle cx="-142" cy="-20" r="4"/><circle cx="-95" cy="-20" r="4"/><circle cx="-48" cy="-20" r="4"/><circle cx="0" cy="-20" r="4"/><circle cx="48" cy="-20" r="4"/><circle cx="95" cy="-20" r="4"/><circle cx="142" cy="-20" r="4"/>
      <circle cx="-142" cy="20" r="4"/><circle cx="-95" cy="20" r="4"/><circle cx="0" cy="20" r="4"/><circle cx="95" cy="20" r="4"/><circle cx="142" cy="20" r="4"/>
      <circle cx="-142" cy="60" r="4"/><circle cx="-48" cy="60" r="4"/><circle cx="48" cy="60" r="4"/>
    </g>

    <!-- selected appointment slot -->
    <circle cx="-48" cy="20" r="12" fill="url(#med-grad)"/>
  </g>

  <!-- EKG pulse line across the middle -->
  <path d="M 60 225 L 190 225 L 220 160 L 250 300 L 280 225 L 340 225 L 370 190 L 400 260 L 430 225 L 740 225"
        fill="none" stroke="url(#med-grad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- medical cross badge -->
  <g transform="translate(400,80)">
    <circle r="30" fill="#0a0d14" stroke="url(#med-grad)" stroke-width="3"/>
    <rect x="-4" y="-16" width="8" height="32" rx="2" fill="url(#med-grad)"/>
    <rect x="-16" y="-4" width="32" height="8" rx="2" fill="url(#med-grad)"/>
  </g>
</svg>
