<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="dms-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#ff3d81"/>
    </linearGradient>
    <radialGradient id="dms-glow" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dms-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" fill="#0f1220"/>
  <rect width="800" height="450" fill="url(#dms-grid)"/>
  <rect width="800" height="450" fill="url(#dms-glow)"/>

  <!-- route path -->
  <path d="M 140 330 Q 300 200 400 260 T 650 150" fill="none" stroke="url(#dms-grad)" stroke-width="3" stroke-dasharray="10 10" opacity="0.8"/>

  <!-- origin pin -->
  <g transform="translate(140,330)">
    <circle r="10" fill="#8b5cf6"/>
    <circle r="18" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- destination pin -->
  <g transform="translate(650,150)">
    <path d="M0,-26 C14,-26 24,-15 24,-2 C24,16 0,34 0,34 C0,34 -24,16 -24,-2 C-24,-15 -14,-26 0,-26 Z" fill="url(#dms-grad)"/>
    <circle r="8" fill="#0f1220"/>
  </g>

  <!-- truck icon in transit -->
  <g transform="translate(400,255)">
    <rect x="-38" y="-16" width="76" height="32" rx="6" fill="#0f1220" stroke="#22d3ee" stroke-width="3"/>
    <rect x="-8" y="-24" width="30" height="24" rx="4" fill="#0f1220" stroke="#22d3ee" stroke-width="3"/>
    <circle cx="-20" cy="18" r="8" fill="#0a0d14" stroke="#ff3d81" stroke-width="3"/>
    <circle cx="18" cy="18" r="8" fill="#0a0d14" stroke="#ff3d81" stroke-width="3"/>
  </g>

  <!-- chat bubble accent -->
  <g transform="translate(230,140)" opacity="0.9">
    <rect x="-34" y="-24" width="68" height="44" rx="12" fill="#0f1220" stroke="#8b5cf6" stroke-width="2.5"/>
    <path d="M -8 20 L -18 34 L 4 20 Z" fill="#0f1220" stroke="#8b5cf6" stroke-width="2.5"/>
    <circle cx="-14" cy="-2" r="3" fill="#8b5cf6"/>
    <circle cx="0" cy="-2" r="3" fill="#8b5cf6"/>
    <circle cx="14" cy="-2" r="3" fill="#8b5cf6"/>
  </g>
</svg>
