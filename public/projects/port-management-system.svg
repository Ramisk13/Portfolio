<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="port-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="port-glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="port-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" fill="#0f1220"/>
  <rect width="800" height="450" fill="url(#port-grid)"/>
  <rect width="800" height="450" fill="url(#port-glow)"/>

  <!-- waterline -->
  <line x1="0" y1="340" x2="800" y2="340" stroke="#ffffff" stroke-opacity="0.1" stroke-width="2"/>
  <path d="M 0 340 Q 40 330 80 340 T 160 340 T 240 340 T 320 340 T 400 340 T 480 340 T 560 340 T 640 340 T 720 340 T 800 340"
        fill="none" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="2"/>

  <!-- crane -->
  <g stroke="#ffffff" stroke-opacity="0.35" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="620" y1="340" x2="620" y2="80"/>
    <line x1="560" y1="90" x2="700" y2="90"/>
    <line x1="620" y1="80" x2="560" y2="90"/>
    <line x1="620" y1="80" x2="700" y2="90"/>
    <line x1="660" y1="90" x2="660" y2="150"/>
  </g>
  <rect x="648" y="150" width="24" height="18" fill="#22d3ee" opacity="0.8"/>

  <!-- container stacks -->
  <g>
    <rect x="120" y="260" width="90" height="60" rx="4" fill="url(#port-grad)" opacity="0.9"/>
    <rect x="212" y="260" width="90" height="60" rx="4" fill="#0a0d14" stroke="#8b5cf6" stroke-width="3"/>
    <rect x="120" y="196" width="90" height="60" rx="4" fill="#0a0d14" stroke="#22d3ee" stroke-width="3"/>
    <rect x="212" y="196" width="90" height="60" rx="4" fill="url(#port-grad)" opacity="0.7"/>

    <rect x="330" y="260" width="90" height="60" rx="4" fill="#0a0d14" stroke="#ff3d81" stroke-width="3"/>
    <rect x="330" y="196" width="90" height="60" rx="4" fill="url(#port-grad)" opacity="0.85"/>
  </g>

  <!-- corrugation lines on containers -->
  <g stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5">
    <line x1="140" y1="260" x2="140" y2="320"/>
    <line x1="160" y1="260" x2="160" y2="320"/>
    <line x1="180" y1="260" x2="180" y2="320"/>
    <line x1="350" y1="196" x2="350" y2="256"/>
    <line x1="370" y1="196" x2="370" y2="256"/>
    <line x1="390" y1="196" x2="390" y2="256"/>
  </g>
</svg>
